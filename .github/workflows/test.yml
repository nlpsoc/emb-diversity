name: Tests

# Trigger: runs on every PR targeting main
on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false           # run all matrix versions even if one fails
      matrix:
        python-version: ["3.11", "3.14"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Installs the project + dev group (which provides pytest).
      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }}

      # -m "not integration": skip slow tests that download models / need internet
      - name: Run tests
        run: uv run --python ${{ matrix.python-version }} pytest -m "not integration"
