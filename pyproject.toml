[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "embediver"
version = "0.1.0"
description = "20 embedding-based diversity measures for text and vector data"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
keywords = ["diversity", "nlp", "embeddings", "text-diversity", "metrics"]
authors = [
    {name = "Anna Wegmann", email = "a.m.wegmann@uu.nl"},
    {name = "Cantao Su", email = "c.su@uu.nl"},
    {name = "Menan Velayuthan", email = "m.velayuthan@uu.nl"},
    {name = "Dong Nguyen", email = "d.p.nguyen@uu.nl"},
    {name = "Esther Ploeger", email = "e.ploeger@uu.nl"},
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Text Processing :: Linguistic",
]
dependencies = [
    "networkx>=2.8",
    "numpy>=1.24",
    "scikit-learn>=1.2",
    "scipy>=1.10",
    "sentence-transformers>=2.7.0",
    "typer>=0.9.0",
    "vendi-score>=0.0.3",
]

[project.optional-dependencies]
eval = ["datasets>=2.14", "pandas>=1.5"]
viz = ["matplotlib>=3.6", "umap-learn>=0.5.9"]

[project.urls]
Homepage = "https://github.com/nlpsoc/Diversity-Measurement"
Documentation = "https://nlpsoc.github.io/Diversity-Measurement/"
Repository = "https://github.com/nlpsoc/Diversity-Measurement"
"Bug Tracker" = "https://github.com/nlpsoc/Diversity-Measurement/issues"

[project.scripts]
embediver = "embediver.cli:app"

[tool.setuptools.packages.find]
where = ["src"]

[dependency-groups]
docs = [
    "sphinx>=8.0.0",
    "sphinx-rtd-theme>=3.0.0",
    "sphinx-autodoc-typehints>=3.0.0",
    "myst-parser>=5.0.0",
]
dev = [
    "pytest>=8.0",
    "notebook>=7.0.0",
    "datasets>=2.14",
    "matplotlib>=3.6",
    "pandas>=1.5",
    "umap-learn>=0.5.9",
    "sphinx>=8.0.0",
    "sphinx-rtd-theme>=3.0.0",
    "sphinx-autodoc-typehints>=3.0.0",
    "myst-parser>=5.0.0",
]

[tool.pytest.ini_options]
testpaths = ["test"]
norecursedirs = ["examples", "build", "dist"]
pythonpath = ["src"]
markers = [
    "integration: marks tests as integration tests (slow, requires internet)"
]
