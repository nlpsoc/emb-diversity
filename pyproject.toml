[build-system]
requires = ["setuptools>=61.0"] # Ensure setuptools is at least version 61.0, which supports pyproject.toml
build-backend = "setuptools.build_meta" # Use setuptools as the build backend

[project]
name = "embediver"
version = "0.1.0"
description = "A package for measuring diversity in text and vector data"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
keywords = ["diversity", "nlp", "embeddings", "text-diversity", "metrics"]
authors = [
    {name = "Cantao Su", email = "c.su@uu.nl"},
    {name = "Anna Wegmann", email = "a.m.wegmann@uu.nl"},
    {name = "Menan Velayuthan", email = "m.velayuthan@uu.nl"},
    {name = "Dong Nguyen", email = "d.p.nguyen@uu.nl"},
    {name = "Esther Ploeger", email = "e.ploeger@uu.nl"},
]
dependencies = [
    "datasets~=3.3.2",
    "matplotlib~=3.10.0",
    "networkx>=2.8.8",
    "numpy~=2.3.5",
    "pandas~=2.3.1",
    "scikit-learn~=1.7.1",
    "scipy~=1.16.0",
    "sentence-transformers>=2.7.0",
    "typer>=0.9.0",
    "umap-learn>=0.5.9",
    "vendi-score>=0.0.3",
]

# Optional extras
#
# `magarea` powers the `mag_areas` measure via magnipy. Upstream
# aidos-lab/magnipy hard-pins scipy==1.13.0 and declares an unused numba
# dependency (which transitively caps numpy<1.27), so it cannot be
# resolved against our scipy~=1.16 / numpy~=2.3 stack. We depend on the
# nlpsoc/magnipy fork, which relaxes scipy to >=1.13 and drops the numba
# and dev-only pins, so this extra locks and installs normally.
#
# Install:
#     pip install -e ".[magarea]"
# or with uv:
#     uv sync --extra magarea
#
# magnipy's code still imports `scipy.integrate.trapz` (removed in scipy
# 1.14), so the `mag_areas` measure runtime-shims `trapz = trapezoid`
# before importing magnipy.
[project.optional-dependencies]
magarea = [
    "magnipy @ git+https://github.com/nlpsoc/magnipy.git@e4a3244e483b7427693e18df480b1a6b94f457b8",
    "numexpr>=2.10",
    "seaborn>=0.13",
    "krypy>=2.2",
]

[project.urls]
Homepage = "https://github.com/nlpsoc/Diversity-Measurement"
Documentation = "https://nlpsoc.github.io/Diversity-Measurement/"
Repository = "https://github.com/nlpsoc/Diversity-Measurement"
"Bug Tracker" = "https://github.com/nlpsoc/Diversity-Measurement/issues"

[project.scripts]
embediver = "embediver.cli:app"

[tool.setuptools.packages.find]
where = ["src"]

[dependency-groups]
docs = [
    "sphinx>=8.0.0",
    "sphinx-rtd-theme>=3.0.0",
    "sphinx-autodoc-typehints>=3.0.0",
    "myst-parser>=5.0.0",
]
dev = [
    "datasets~=3.3.2",
    "notebook>=7.0.0",
    "matplotlib~=3.10.0",
    "numpy~=2.3.5",
    "pandas~=2.3.1",
    "plotly>=5.0.0",
    "pytest~=8.4.1",
    "scikit-learn~=1.7.1",
    "scipy~=1.16.0",
    "sentence-transformers>=2.7.0",
    "sphinx>=8.0.0",
    "sphinx-rtd-theme>=3.0.0",
    "sphinx-autodoc-typehints>=3.0.0",
    "myst-parser>=5.0.0",
    "umap-learn>=0.5.9",
]

[tool.pytest.ini_options]
testpaths = ["test"]
norecursedirs = ["examples", "build", "dist"]
pythonpath = ["src"]
markers = [
    "integration: marks tests as integration tests (slow, requires internet)"
]
